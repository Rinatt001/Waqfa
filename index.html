<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waqfa — Islamic Social Finance Infrastructure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal: #059669;
  --teal-mid: #047857;
  --teal-light: #E8F5F0;
  --teal-pale: #F2FAF7;
  --gold: #B8860B;
  --gold-light: #FDF6E3;
  --ink: #111827;
  --ink-mid: #374151;
  --ink-muted: #6B7280;
  --ink-faint: #9CA3AF;
  --white: #FFFFFF;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --border: #E5E7EB;
  
  --radius: 6px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --max: 1120px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);

  --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-display: 'Instrument Serif', Georgia, serif;
  
  --text-xs: 0.75rem;    /* 12px */
  --text-sm: 0.875rem;   /* 14px */
  --text-base: 1rem;     /* 16px */
  --text-md: 1.125rem;   /* 18px */
  --text-lg: 1.25rem;    /* 20px */
  --text-xl: 1.5rem;     /* 24px */
  --text-2xl: 2.25rem;   /* 36px */
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--white);
  color: var(--ink);
  font-size: var(--text-base);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-inner {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  height: 64px;
  gap: 32px;
}
.nav-logo {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 1.25rem;
  color: var(--teal);
  text-decoration: none;
  display: flex;
  align-items: center;
}
.nav-logo span {
  width: 24px; height: 24px;
  background: var(--teal);
  border-radius: 5px;
  margin-right: 8px;
  position: relative;
}
.nav-logo span::after {
  content: 'W'; color: white; font-size: 0.85rem; font-weight: 700;
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.nav-links { display: flex; gap: 8px; list-style: none; margin-left: auto; }
.nav-links a { font-size: var(--text-sm); color: var(--ink-mid); text-decoration: none; font-weight: 500; padding: 6px 12px; border-radius: var(--radius); }
