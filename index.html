<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waqfa — Islamic Social Finance Infrastructure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal: #059669;
  --teal-mid: #047857;
  --teal-light: #E8F5F0;
  --teal-pale: #F2FAF7;
  --gold: #B8860B;
  --gold-light: #FDF6E3;
  --ink: #111827;
  --ink-mid: #374151;
  --ink-muted: #6B7280;
  --ink-faint: #9CA3AF;
  --white: #FFFFFF;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --border: #E5E7EB;
  
  --radius: 6px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --max: 1120px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);

  --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-display: 'Instrument Serif', Georgia, serif;
  
  --text-xs: 0.75rem;    /* 12px */
  --text-sm: 0.875rem;   /* 14px */
  --text-base: 1rem;     /* 16px */
  --text-md: 1.125rem;   /* 18px */
  --text-lg: 1.25rem;    /* 20px */
  --text-xl: 1.5rem;     /* 24px */
  --text-2xl: 2.25rem;   /* 36px */
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--white);
  color: var(--ink);
  font-size: var(--text-base);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── TOP BANNER ── */
.top-banner {
  background: var(--teal);
  color: white;
  text-align: center;
  padding: 10px 1rem;
  font-size: var(--text-sm);
  font-weight: 500;
}
.top-banner a { color: #A7F3D0; text-decoration: none; border-bottom: 1px solid rgba(167,243,208,0.4); }

/* ── NAV ── */
nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-inner {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  height: 64px;
  gap: 32px;
}
.nav-logo {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 1.25rem;
  color: var(--teal);
  text-decoration: none;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
}
.nav-logo span {
  width: 24px; height: 24px;
  background: var(--teal);
  border-radius: 5px;
  margin-right: 8px;
  position: relative;
}
.nav-logo span::after {
  content: 'W';
  color: white;
  font-size: 0.85rem;
  font-weight: 700;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.nav-search {
  flex: 1;
  max-width: 400px;
  position: relative;
}
.nav-search input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border: 1px solid var(--gray-300);
  border-radius: 6px;
  font-size: var(--text-sm);
  font-family: var(--font-body);
  background: var(--gray-50);
  outline: none;
}
.nav-search svg {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  stroke: var(--ink-faint);
  fill: none; stroke-width: 2;
}
.nav-links {
  display: flex;
  gap: 8px;
  list-style: none;
  margin-left: auto;
}
.nav-links a {
  font-size: var(--text-sm);
  color: var(--ink-mid);
  text-decoration: none;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius);
}
.nav-links a:hover { background: var(--gray-100); color: var(--ink); }
.nav-cta-btn {
  background: var(--teal) !important;
  color: white !important;
}

/* ── HERO ── */
.hero {
  padding: 80px 1.5rem 100px;
}
.hero-inner {
  max-width: var(--max);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 64px;
  align-items: center;
}
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--teal-light);
  color: var(--teal);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 24px;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 5vw, 3.8rem);
  font-weight: 400;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: 24px;
  letter-spacing: -0.02em;
}
.hero h1 em { font-style: italic; color: var(--teal); }
.hero-sub {
  font-size: var(--text-lg);
  color: var(--ink-muted);
  line-height: 1.6;
  margin-bottom: 32px;
  font-weight: 300;
  max-width: 520px;
}
.hero-search-bar {
  display: flex;
  border: 1.5px solid var(--teal);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  margin-bottom: 20px;
}
.hero-search-bar input {
  flex: 1;
  padding: 14px 18px;
  font-size: var(--text-base);
  border: none;
  outline: none;
}
.hero-search-bar select {
  border: none;
  border-left: 1px solid var(--gray-200);
  padding: 0 16px;
  font-size: var(--text-sm);
  background: var(--gray-50);
  cursor: pointer;
}
.hero-search-bar button {
  background: var(--teal);
  color: white;
  border: none;
  padding: 0 24px;
  font-size: var(--text-base);
  font-weight: 600;
  cursor: pointer;
}

.hero-platform {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.platform-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  text-decoration: none;
  color: inherit;
  transition: all 0.2s;
}
.platform-card:hover { border-color: var(--teal); box-shadow: var(--shadow); }
.platform-card.featured {
  grid-column: 1 / -1;
  background: var(--teal-pale);
  display: flex;
  gap: 20px;
}
.pc-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: var(--teal-light);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pc-icon svg { width: 20px; height: 20px; stroke: var(--teal); fill: none; stroke-width: 2; }
.platform-card h3 { font-size: var(--text-md); margin-bottom: 6px; font-weight: 600; }
.platform-card p { font-size: var(--text-sm); color: var(--ink-muted); line-height: 1.5; font-weight: 300; }

/* ── STATS BAR ── */
.stats-bar {
  background: var(--gray-50);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 32px 1.5rem;
}
.stats-bar-inner {
  max-width: var(--max);
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  text-align: center;
}
.stat-item .num {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  color: var(--teal);
  line-height: 1;
  margin-bottom: 8px;
}
.stat-item .lbl {
  font-size: var(--text-xs);
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ── SECTION COMMONS ── */
.section { padding: 100px 1.5rem; }
.section-inner { max-width: var(--max); margin: 0 auto; }
.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 12px;
  display: block;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 2.8rem);
  line-height: 1.2;
  margin-bottom: 16px;
}
.section-sub {
  font-size: var(--text-lg);
  color: var(--ink-muted);
  font-weight: 300;
  max-width: 600px;
  line-height: 1.6;
}

/* ── INSTITUTION CARDS ── */
.inst-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 40px;
}
.inst-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  display: flex;
  flex-direction: column;
  min-height: 320px; /* Fixed height for alignment */
}
.inst-header { display: flex; gap: 12px; margin-bottom: 20px; align-items: flex-start; }
.inst-avatar { width: 44px; height: 44px; border-radius: 8px; background: var(--teal-light); display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--teal); flex-shrink: 0; }
.inst-name { font-size: var(--text-base); font-weight: 600; margin-bottom: 2px; }
.inst-loc { font-size: var(--text-xs); color: var(--ink-faint); }
.inst-seal { font-size: var(--text-xs); font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-left: auto; white-space: nowrap; }
